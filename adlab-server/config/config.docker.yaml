server:
  port: 8080
  mode: release

sdkapi:
  port: 8080
  enable_docs: true
  enable_lab: true
  enable_health: true
  rate_limit_enabled: true
  rate_limit_rps: 100
  rate_limit_burst: 200

database:
  type: postgres
  host: postgres
  port: 5432
  user: adlab
  password: adlab
  dbname: adlab
  sslmode: disable
  timezone: Asia/Shanghai

dsp:
  default_timeout_ms: 200
  max_concurrency: 10
