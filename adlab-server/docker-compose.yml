services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: adlab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-adlab}
      POSTGRES_USER: ${POSTGRES_USER:-adlab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adlab}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adlab} -d ${POSTGRES_DB:-adlab}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        GO_BASE_IMAGE: ${GO_BASE_IMAGE:-golang:1.23-alpine}
        BACKEND_RUNTIME_IMAGE: ${BACKEND_RUNTIME_IMAGE:-alpine:3.20}
    container_name: adlab-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADLAB_CONFIG_PATH: /app/config/config.docker.yaml
      ADLAB_DATABASE_TYPE: postgres
      ADLAB_DATABASE_HOST: postgres
      ADLAB_DATABASE_PORT: 5432
      ADLAB_DATABASE_USER: ${POSTGRES_USER:-adlab}
      ADLAB_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-adlab}
      ADLAB_DATABASE_DBNAME: ${POSTGRES_DB:-adlab}
      ADLAB_DATABASE_SSLMODE: disable
      ADLAB_DATABASE_TIMEZONE: ${TZ:-Asia/Shanghai}
      ADLAB_ADMIN_TOKEN: ${ADLAB_ADMIN_TOKEN:-}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  seed:
    build:
      context: .
      dockerfile: Dockerfile.tools
      args:
        GO_BASE_IMAGE: ${GO_BASE_IMAGE:-golang:1.23-alpine}
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADLAB_CONFIG_PATH: /app/config/config.docker.yaml
      ADLAB_DATABASE_TYPE: postgres
      ADLAB_DATABASE_HOST: postgres
      ADLAB_DATABASE_PORT: 5432
      ADLAB_DATABASE_USER: ${POSTGRES_USER:-adlab}
      ADLAB_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-adlab}
      ADLAB_DATABASE_DBNAME: ${POSTGRES_DB:-adlab}
      ADLAB_DATABASE_SSLMODE: disable
      ADLAB_DATABASE_TIMEZONE: ${TZ:-Asia/Shanghai}
    command: ["go", "run", "scripts/seed.go"]

  admin:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:20-alpine}
        ADMIN_NGINX_IMAGE: ${ADMIN_NGINX_IMAGE:-nginx:1.27-alpine}
    container_name: adlab-admin
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: ${NGINX_IMAGE:-nginx:1.27-alpine}
    container_name: adlab-nginx
    restart: unless-stopped
    depends_on:
      admin:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

volumes:
  postgres-data:
