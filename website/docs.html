## iOS SDK 集成指南

AeroBid iOS SDK 是一个用 Swift 编写的超轻量级变现聚合库，旨在无缝调度本地 S2S / C2S 广告源。

### 1. 安装 SDK 支持
在您的 Xcode 项目中，推荐使用 Swift Package Manager (SPM) 引入包：
```swift
https://github.com/Redamancywu/AeroBid-iOS-SDK.git
```

### 2. 初始化 SDK 核心
在您的 AppDelegate.swift 文件中，引入模块并在应用启动时注册授权密钥：
```swift
import AeroBidSDK

func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: ...) -> Bool {
    // 初始化 AeroBid 并触发预分配缓存
    AeroBidSDK.shared.initialize(
        appKey: "ab_prod_8f9c0e4",
        appSecret: "sec_7d2f9b8c"
    ) { success in
        print("AeroBid SDK 状态: \(success ? "就绪" : "异常")")
    }
    return true
}
```

### 3. 载入并播放插屏视频 (Interstitial)
在需要触发变现广告的控制器中，调用以下 API 加载并展示胜出广告：
```swift
class HomeViewController: UIViewController {
    var interstitial: AeroBidInterstitial?

    func loadAdPressed() {
        // 指定后台配好的 Placement ID
        interstitial = AeroBidInterstitial(placementId: "d1f3a5b7c9e1f201")

        interstitial?.loadAd { [weak self] result in
            switch result {
            case .success(let ad):
                // 竞价比对胜出后，调用原生播放器渲染 VAST 视频
                ad.show(from: self)
                print("最高胜出竞价: $\(ad.cpm) USD, 渠道: \(ad.dspName)")
            case .failure(let error):
                print("无广告填充或网络超时: \(error.localizedDescription)")
            }
        }
    }
}
```
  </script>

## Android SDK 集成指南

AeroBid Android SDK 专为 Kotlin/Java 开发设计，封装了高效的 HTTP 请求池与本地 VAST 播放追踪组件。

### 1. 添加 Gradle 依赖
在项目根目录 build.gradle 中注册 Maven 仓库地址：
```gradle
allprojects {
    repositories {
        maven { url 'https://maven.aerobid.io/repository/public/' }
    }
}
```
在模块 app/build.gradle 中添加依赖项：
```gradle
dependencies {
    implementation 'com.aerobid.sdk:core:1.2.0'
}
```

### 2. SDK 全局初始化
在您的 Application 类或主 Activity 启动时，拉起引擎：
```kotlin
import com.aerobid.sdk.AeroBid

class MainApplication : Application() {
    override fun onCreate() {
        super.onCreate()
        // 一键拉起后台长连接与预请求
        AeroBid.initialize(
            context = this,
            appKey = "ab_prod_8f9c0e4",
            appSecret = "sec_7d2f9b8c"
        )
    }
}
```

### 3. 异步载入激励视频
```kotlin
val rewarded = AeroBidRewardedAd(this, "d1f3a5b7c9e1f201")
rewarded.load(object : AeroBidAdListener {
    override fun onAdLoaded(ad: AeroBidAd) {
        // 触发标准 VAST 4.2 规格激励视频播放
        rewarded.show()
    }

    override fun onAdFailed(error: AeroBidError) {
        Log.e("AeroBid", "变现无填充: ${error.message}")
    }
})
```
  </script>

## Web JS SDK 接入指南

AeroBid Web SDK 支持现代化的浏览器架构变现，可高效分发 Web 端插屏、视频及横幅广告位。

### 1. 包引入
使用包管理工具安装 ESM 模块：
```bash
npm install @aerobid/web-sdk
```
或者在网页 HTML 中直接导入 CDN 库文件：
```html
<script src="https://cdn.aerobid.io/sdk/web-sdk.min.js"></script>
```

### 2. 创建比价实例
```javascript
import { AeroBidEngine } from '@aerobid/web-sdk';

const client = new AeroBidEngine({
  appKey: 'ab_prod_8f9c0e4',
  endpoint: 'http://localhost:8080/api/v1'
});
```

### 3. 请求并渲染 DOM 横幅广告
```javascript
client.requestBid({
  placementId: 'plc_web_banner',
  sizes: [[300, 250]]
}).then(ad => {
  // 将服务端竞价胜出的 HTML 创意直接渲染在插槽中
  document.getElementById('ad-slot').innerHTML = ad.creativeHTML;
  console.log(`渲染成功! 胜出单价: ${ad.cpm} CPM, 来源: ${ad.dspId}`);
}).catch(err => {
  console.warn('本轮竞价无填充响应', err);
});
```

## REST API 服务端对接规范

直接通过服务端接口（S2S）调用 AeroBid 比价核心，适合需要私有化定制接入的高级程序化买家与聚合中台。

### 1. 请求广告核心路由
```text
POST  http://localhost:8080/api/v1/ad/request
```

### 2. JSON 请求载荷格式
```json
{
  "placement_id": "d1f3a5b7c9e1f201",
  "device": {
    "platform": "ios",
    "os_version": "17.0",
    "device_model": "iPhone15,2",
    "language": "zh-CN"
  }
}
```

### 3. 成功响应结构 (200 OK)
如果 S2S 比价有正向响应，服务端会返回符合比价信息的统一实体结构，包含对应的 VAST 视频 XML 素材体：
```json
{
  "code": 200,
  "message": "success",
  "data": {
    "request_id": "req_bf0214a1c",
    "placement_id": "d1f3a5b7c9e1f201",
    "ad_type": "rewarded_video",
    "bid_mode": "s2s",
    "winner_dsp_id": "applovin",
    "winner_price": 8.65,
    "is_mock": false,
    "vast_xml": "<VAST version=\"4.2\">...</VAST>"
  }
}
```

  <script>
    const API_BASE = 'http://localhost:8080/api/v1';

    function getDefaultTitle(key) {
      switch(key) {
        case 'ios': return 'iOS SDK 集成指南';
        case 'android': return 'Android SDK 集成指南';
        case 'web': return 'Web JS SDK 接入指南';
        case 'api': return 'REST API 对接规范';
        default: return '开发者文档';
      }
    }

    // Dynamic Loader Function with Fallback
    async function loadDocument(key) {
      // Update sidebar nav active state
      document.querySelectorAll('.sidebar-nav-item').forEach(el => {
        if (el.getAttribute('data-key') === key) {
          el.classList.add('active');
        } else {
          el.classList.remove('active');
        }
      });

      const titleArea = document.getElementById('docs-main-title');
      const contentArea = document.getElementById('docs-body-content');
      const updateTimeArea = document.getElementById('docs-update-time');

      contentArea.style.opacity = '0.4';

      try {
        const response = await fetch(`${API_BASE}/docs/${key}`);
        if (response.ok) {
          const result = await response.json();
          if (result.code === 200 && result.data) {
            const doc = result.data;
            titleArea.textContent = doc.title;
            contentArea.innerHTML = marked.parse(doc.content);
            if (doc.updated_at) {
              const date = new Date(doc.updated_at);
              updateTimeArea.textContent = `最后更新: ${date.toLocaleString('zh-CN')} (同步自管理后台)`;
            } else {
              updateTimeArea.textContent = '实时同步最新版';
            }
            contentArea.style.opacity = '1';
            return;
          }
        }
      } catch (err) {
        console.warn(`[AeroBid Docs] Backend offline, falling back to local cached doc.`, err);
      }

      // Fallback from hidden DOM markdown block (supports both <script> and <template>)
      const fallbackEl = document.getElementById(`fallback-${key}`);
      if (fallbackEl) {
        let defaultDoc;
        if (fallbackEl.tagName === 'TEMPLATE') {
          // <template> stores content in a DocumentFragment; extract text via a temp div
          const tmp = document.createElement('div');
          tmp.appendChild(fallbackEl.content.cloneNode(true));
          defaultDoc = tmp.textContent.trim();
        } else {
          defaultDoc = fallbackEl.textContent.trim();
        }
        titleArea.textContent = getDefaultTitle(key);
        contentArea.innerHTML = marked.parse(defaultDoc);
        updateTimeArea.textContent = '本地高保真预置文档 (服务端未连接)';
      } else {
        contentArea.innerHTML = '<p style="color: #64748b; font-style: italic;">文档正在载入中...</p>';
      }
      contentArea.style.opacity = '1';
    }

    // Initialize with first tab
    window.addEventListener('DOMContentLoaded', () => {
      loadDocument('ios');
    });
  </script>
</body>
</html>
